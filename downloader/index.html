<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S-band Downloader</title>
  <link rel="stylesheet" href="styles.css?v=20260614-download-mode">
  <style>
    .demo-shell {
      width: min(1280px, calc(100vw - 32px));
    }

    body.viewer-page .demo-shell {
      width: min(1280px, calc(100vw - 24px));
    }

    body.viewer-page .tabs,
    body.viewer-page .demo-time-filters,
    body.viewer-page .filter-drawer,
    body.viewer-page .summary-strip,
    body.viewer-page .column-board,
    body.viewer-page .table-wrap,
    body.viewer-page .pager,
    body.viewer-page #searchButton,
    body.viewer-page .download-cell {
      display: none;
    }

    body.viewer-page .actions {
      display: flex;
      justify-content: flex-end;
      gap: 14px;
      padding: 16px 22px;
    }

    body.viewer-page .viewer-panel {
      border-top: 1px solid var(--line);
    }

    body.viewer-embedded {
      background: #ffffff;
    }

    body.viewer-embedded .demo-shell {
      width: 100%;
      margin: 0;
    }

    body.viewer-embedded .app-header,
    body.viewer-embedded .actions,
    body.viewer-embedded .viewer-add-chart-bar {
      display: none;
    }

    body.viewer-embedded .workspace {
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    body.viewer-embedded .viewer-panel {
      border-top: 0;
    }

    body.viewer-embedded .viewer-filter-summary-bar {
      display: none;
    }

    body.viewer-embedded .viewer-chart-parameter-head,
    body.viewer-embedded .viewer-chart-graph-head {
      display: none;
    }

    body.viewer-controls-only .viewer-chart-graph-head,
    body.viewer-controls-only .viewer-chart,
    body.viewer-controls-only .viewer-additional-chart-controls,
    body.viewer-controls-only .viewer-additional-charts,
    body.viewer-controls-only .viewer-status,
    body.viewer-controls-only #viewerExportSvg {
      display: none;
    }

    body.viewer-graph-only .viewer-chart-parameter-head,
    body.viewer-graph-only .viewer-toolbar,
    body.viewer-graph-only .viewer-range-bar,
    body.viewer-graph-only .viewer-additional-chart-controls,
    body.viewer-graph-only .viewer-additional-charts {
      display: none;
    }

    .demo-note {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .demo-bar {
      display: grid;
      grid-template-columns: 170px 170px minmax(210px, 1fr) 130px;
      gap: 14px;
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .demo-time-filters {
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .filter-drawer {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .filter-drawer summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 52px;
      padding: 0 22px;
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      list-style: none;
    }

    .filter-drawer summary::-webkit-details-marker {
      display: none;
    }

    .filter-drawer summary::after {
      content: "+";
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
    }

    .filter-drawer[open] summary::after {
      content: "-";
    }

    .filter-summary {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .viewer-filter-summary-bar {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .viewer-filter-summary-bar[hidden] {
      display: none;
    }

    .viewer-filter-summary-title {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      padding-top: 5px;
    }

    .viewer-filter-chips {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .viewer-filter-chip,
    .viewer-filter-empty {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-self: start;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfe;
      color: var(--text);
      font-size: 12px;
      font-weight: 650;
    }

    .viewer-filter-chip strong {
      color: var(--muted);
      font-weight: 700;
    }

    .viewer-filter-chip span:last-child,
    .viewer-filter-empty {
      color: var(--muted);
    }

    .filter-panel {
      padding: 0 22px 18px;
    }

    .filter-grid {
      display: grid;
      gap: 10px;
    }

    .filter-rows {
      display: grid;
      gap: 10px;
    }

    .filter-header,
    .filter-row {
      display: grid;
      grid-template-columns: minmax(130px, 0.9fr) minmax(220px, 1.6fr) minmax(100px, 0.7fr) 20px minmax(100px, 0.7fr) 38px;
      gap: 10px;
      align-items: center;
    }

    .filter-header {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
    }

    .range-mark {
      color: var(--muted);
      font-size: 18px;
      text-align: center;
    }

    .icon-action {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 20px;
      font-weight: 650;
      line-height: 1;
      cursor: pointer;
    }

    .icon-action:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .icon-action.close-action {
      position: relative;
      color: var(--muted);
      font-size: 0;
    }

    .icon-action.close-action::before,
    .icon-action.close-action::after {
      content: "";
      position: absolute;
      width: 15px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    .icon-action.close-action::before {
      transform: rotate(45deg);
    }

    .icon-action.close-action::after {
      transform: rotate(-45deg);
    }

    .icon-action.close-action:hover {
      color: var(--text);
    }

    .filter-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .metric {
      min-height: 78px;
      padding: 16px 18px;
      border-right: 1px solid var(--line);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      font-weight: 680;
    }

    .column-board {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 18px;
      padding: 22px;
    }

    .preset-list,
    .column-preview,
    .query-preview {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .preset-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      width: 100%;
      min-height: 48px;
      padding: 10px 14px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .preset-button:last-child {
      border-bottom: 0;
    }

    .preset-button[aria-pressed="true"] {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .preset-button span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
    }

    .preset-button small {
      color: inherit;
      font-weight: 650;
    }

    .preview-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px 112px;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .column-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      max-height: 380px;
      overflow: auto;
      padding: 14px;
    }

    .column-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }

    .column-item input {
      flex: 0 0 auto;
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .column-item span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .more-row {
      grid-column: 1 / -1;
      min-height: 36px;
      padding: 10px 12px;
      border: 1px dashed #aeb7c3;
      border-radius: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .query-preview {
      margin-top: 18px;
    }

    .query-line {
      margin: 0;
      padding: 14px;
      overflow: auto;
      color: #263243;
      background: #fbfcfe;
      font-size: 13px;
      white-space: nowrap;
    }

    .sample-table {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .sample-table table {
      min-width: 760px;
    }

    .viewer-panel {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .viewer-panel[hidden] {
      display: none;
    }

    .viewer-toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(360px, 1.2fr) minmax(360px, 1.2fr);
      gap: 12px;
      align-items: start;
      padding: 18px 22px;
      background: #fbfcfe;
    }

    .viewer-axis-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 58px;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .viewer-axis-name,
    .viewer-y-series-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
    }

    .viewer-axis-unit {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-align: right;
      text-transform: none;
      white-space: nowrap;
    }

    .viewer-y-axis-group,
    .viewer-y2-axis-control {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .viewer-y-axis-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: center;
    }

    .viewer-normalize-control {
      display: grid;
      gap: 5px;
      min-width: 150px;
    }

    .viewer-y-series-list {
      display: grid;
      gap: 8px;
    }

    .viewer-y-series-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 58px 38px;
      gap: 8px;
      align-items: center;
    }

    .viewer-range-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr)) 96px minmax(220px, auto);
      gap: 10px;
      align-items: end;
      padding: 0 22px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .viewer-range-bar input {
      min-width: 0;
    }

    .viewer-range-bar input.invalid {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
    }

    .viewer-view-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .viewer-view-tools .action {
      min-width: 64px;
    }

    .viewer-view-tools .icon-action {
      width: auto;
      min-width: 42px;
      padding: 0 10px;
      font-size: 13px;
    }

    .viewer-chart-parameter-head,
    .viewer-chart-graph-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      background: #ffffff;
    }

    .viewer-parameter-controls {
      display: flex;
      align-items: end;
      justify-content: flex-end;
      gap: 12px;
      min-width: 0;
    }

    .viewer-graph-controls {
      display: flex;
      align-items: end;
      justify-content: flex-end;
      gap: 12px;
      min-width: 0;
    }

    .viewer-graph-type-control {
      display: grid;
      gap: 5px;
      min-width: 150px;
    }

    .viewer-graph-type-control select {
      min-height: 38px;
    }

    .viewer-add-chart-bar {
      display: flex;
      justify-content: flex-start;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .viewer-add-chart-bar .action {
      min-width: 126px;
    }

    .viewer-additional-chart-controls {
      display: grid;
      gap: 12px;
      padding: 0;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .viewer-additional-chart-controls:empty,
    .viewer-additional-charts:empty {
      display: none;
    }

    .viewer-additional-charts {
      display: grid;
      gap: 18px;
      padding: 0 0 18px;
      background: #f8fafc;
    }

    .viewer-added-chart,
    .viewer-added-chart-control {
      display: grid;
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .viewer-added-chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 22px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .viewer-added-chart-head-tools {
      display: flex;
      align-items: end;
      gap: 10px;
      margin-left: auto;
      min-width: 0;
    }

    .viewer-added-chart-head .viewer-normalize-control {
      min-width: 130px;
    }

    .viewer-chart-frame {
      display: block;
      width: 100%;
      border: 0;
      background: #ffffff;
    }

    .viewer-control-frame {
      height: 325px;
    }

    .viewer-graph-frame {
      height: 385px;
    }

    .viewer-zoom-status {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .viewer-chart {
      display: block;
      width: 100%;
      height: 340px;
      background: #ffffff;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    .viewer-chart.is-panning {
      cursor: grabbing;
    }

    .viewer-legend {
      cursor: pointer;
    }

    .viewer-legend text {
      fill: var(--text);
      font-size: 11px;
      font-weight: 700;
      user-select: none;
    }

    .viewer-legend.is-muted {
      opacity: 0.38;
    }

    .viewer-axis {
      stroke: #97a3b6;
      stroke-width: 1;
    }

    .viewer-grid {
      stroke: #e4e8ef;
      stroke-width: 1;
    }

    .viewer-tick {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .viewer-axis-title {
      fill: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .viewer-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.8;
      opacity: 0.78;
      vector-effect: non-scaling-stroke;
    }

    .viewer-dot {
      fill: var(--accent);
      fill-opacity: 0.92;
      stroke: none;
    }

    .viewer-crosshair {
      stroke: #64748b;
      stroke-dasharray: 4 4;
      stroke-width: 1;
    }

    .viewer-tooltip-box {
      fill: #111827;
      opacity: 0.92;
      rx: 6;
    }

    .viewer-tooltip-text {
      fill: #ffffff;
      font-size: 11px;
      font-weight: 650;
    }

    .viewer-empty {
      fill: var(--muted);
      font-size: 14px;
      font-weight: 650;
      text-anchor: middle;
    }

    @media (max-width: 900px) {
      .demo-shell {
        width: calc(100vw - 20px);
      }

      .demo-bar,
      .summary-strip,
      .column-board,
      .filter-header,
      .filter-row,
      .viewer-toolbar,
      .viewer-range-bar,
      .viewer-added-chart-head,
      .preview-tools {
        grid-template-columns: 1fr;
      }

      body.viewer-controls-only .viewer-toolbar {
        grid-template-columns: minmax(260px, 0.9fr) minmax(360px, 1.2fr) minmax(360px, 1.2fr);
      }

      body.viewer-controls-only .viewer-range-bar {
        grid-template-columns: repeat(4, minmax(120px, 1fr)) 96px minmax(220px, auto);
      }

      body.viewer-controls-only .viewer-added-chart-head {
        display: flex;
      }

      .filter-header {
        display: none;
      }

      .range-mark {
        display: none;
      }

      .metric {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .metric:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell demo-shell">
    <header class="app-header">
      <div>
        <h1>S-band Downloader</h1>
        <p class="server-state" id="serverState">Server not checked</p>
      </div>
      <label class="api-field">
        API
        <input id="apiBase" type="url" value="http://133.18.161.115/api">
      </label>
    </header>

    <section class="workspace">
      <div class="tabs" role="tablist" aria-label="Telemetry datasets">
        <button class="tab" data-dataset="main" role="tab" aria-selected="true">Main HK</button>
        <button class="tab" data-dataset="realtime" role="tab" aria-selected="false">Real Time HK</button>
        <button class="tab" data-dataset="adcs" role="tab" aria-selected="false">ADCS HK</button>
      </div>

      <form class="filters demo-time-filters">
        <div class="time-filter" role="radiogroup" aria-label="Time Filter">
          <span class="field-title">Time Filter</span>
          <label class="time-choice">
            <input name="timeMode" type="radio" value="pic" checked>
            <span>PIC time</span>
          </label>
          <label class="time-choice">
            <input name="timeMode" type="radio" value="received">
            <span>Received time</span>
          </label>
        </div>
        <div class="range-column">
          <span class="field-title">Time Range</span>
          <label class="range-row">
            <span>Start</span>
            <input id="startDate" name="startDate" type="date" value="2026-01-01">
            <input id="startTime" name="startTime" type="time" min="00:00" max="23:59" step="60" value="00:00">
          </label>
          <label class="range-row">
            <span>End</span>
            <input id="endDate" name="endDate" type="date" value="2026-12-31">
            <input id="endTime" name="endTime" type="time" min="00:00" max="23:59" step="60" value="00:00">
          </label>
        </div>
        <label>
          GSE
          <select id="gseSelect" name="gse">
            <option value="">All</option>
            <option value="Kyutech">Kyutech</option>
            <option value="ISAS">ISAS</option>
            <option value="unknown">unknown</option>
          </select>
        </label>
        <label>
          Limit
          <input id="limitInput" name="limit" type="number" value="1000" min="1" max="100000">
        </label>
        <label>
          Order
          <select id="orderSelect" name="order">
            <option value="desc" selected>Descending</option>
            <option value="asc">Ascending</option>
          </select>
        </label>
        <label>
          Decoder
          <select id="decoderSelect" name="decoder">
            <option value="latest" selected>latest</option>
            <option value="20260504">20260504</option>
          </select>
        </label>
      </form>

      <details class="filter-drawer" id="valueFilterDrawer">
        <summary>
          <span>Value Filters</span>
          <span class="filter-summary" id="filterSummary">0 active</span>
        </summary>
        <div class="filter-panel">
          <div class="filter-grid">
            <div class="filter-header" aria-hidden="true">
              <span>PIC set</span>
              <span>Element</span>
              <span>Lower</span>
              <span></span>
              <span>Upper</span>
              <span></span>
            </div>
            <div class="filter-rows" id="filterRows"></div>
          </div>
          <div class="filter-actions">
            <button class="icon-action" id="addFilterRow" type="button" aria-label="Add value filter">+</button>
          </div>
        </div>
      </details>

      <div class="actions">
        <div class="pager">

          const referenceY2 = state.viewerY2Series[0];
          const y2Options = yAxisOptionColumns(yColumns, referenceY2);
          state.viewerY2Series.push(defaultAdditionalViewerY2Column(y2Options.length ? y2Options : yColumns));
        }
        renderViewerY2SeriesControls(yColumns);
        updateViewerAxisDisplay();
        renderViewer();
      });
    }
    viewerGraphType.addEventListener("change", () => {
      renderViewer();
      if (IS_VIEWER_GRAPH_EMBED) emitEmbeddedViewerState();
    });
    [viewerXMin, viewerXMax, viewerYMin, viewerYMax].forEach((input) => {
      input.addEventListener("input", () => {
        delete input.dataset.autoValue;
      });
      input.addEventListener("change", renderViewer);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          input.blur();
          renderViewer();
        }
      });
    });
    viewerRangeReset.addEventListener("click", resetViewerRangeToAuto);
    if (viewerZoomFit) {
      viewerZoomFit.addEventListener("click", resetViewerRangeToAuto);
    }
    if (viewerExportSvg) {
      viewerExportSvg.addEventListener("click", exportViewerSvg);
    }
    if (addViewerChart) {
      addViewerChart.addEventListener("click", addViewerChartFrame);
    }
    if (IS_VIEWER_CONTROLS_EMBED && viewerPanel) {
      viewerPanel.addEventListener("change", scheduleEmbeddedViewerState);
      viewerPanel.addEventListener("click", (event) => {
        if (event.target.closest("button")) scheduleEmbeddedViewerState();
      });
    }
    if (!IS_EMBEDDED_VIEWER) {
      window.addEventListener("message", handleViewerChartMessage);
    }
    viewerChart.addEventListener("wheel", handleViewerChartWheel, { passive: false });
    viewerChart.addEventListener("pointerdown", handleViewerChartPointerDown);
    viewerChart.addEventListener("pointermove", handleViewerChartPointerMove);
    viewerChart.addEventListener("pointerup", finishViewerChartPan);
    viewerChart.addEventListener("pointercancel", finishViewerChartPan);
    viewerChart.addEventListener("lostpointercapture", finishViewerChartPan);
    viewerChart.addEventListener("pointerleave", hideViewerTooltip);
    viewerChart.addEventListener("click", handleViewerChartClick);
    downloadButton.addEventListener("click", () => {
      renderUrl();
      window.location.href = state.downloadUrl;
    });
    pageInput.addEventListener("change", () => jumpToPage(pageInput.value));
    pageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        jumpToPage(pageInput.value);
      }
    });
    document.querySelectorAll("[data-page]").forEach((button) => {
      button.addEventListener("click", () => changePage(button.dataset.page));
    });

    addFilterRow.addEventListener("click", () => {
      state.valueFilters.push(defaultValueFilter());
      renderFilters();
      renderUrl();
      updateFilterSummary();
    });

    function defaultValueFilter() {
      const preset = filterPresetOptions()[0] || currentDataset().presets[0];
      const element = preset.columns[0] || "";
      return { picSet: preset.id, element, upper: "", lower: "" };
    }

    function currentDataset() {
      return datasets[state.dataset];
    }

    function currentPreset(presetId = state.presetId) {
      return currentDataset().presets.find((preset) => preset.id === presetId);
    }

    function filterPresetOptions() {
      if (state.dataset === "adcs" && valueColumns.adcs?.length) {
        const adcsAllPreset = {
          ...currentDataset().presets[0],
          columns: valueColumns.adcs,
          count: valueColumns.adcs.length
        };
        return [adcsAllPreset, ...currentDataset().presets.slice(1)];
      }
      const presets = currentDataset().presets.filter((preset) => !preset.id.endsWith("_all"));
      return presets.length ? presets : currentDataset().presets;
    }

    function filterPresetById(presetId) {
      return filterPresetOptions().find((preset) => preset.id === presetId) || filterPresetOptions()[0];
    }

    function render() {
      renderFilters();
      updateFilterSummary();
      renderUrl();
      renderSampleTable();
      updatePager(0);
      renderViewerControls();
      renderViewer();
    }

    function renderFilters() {
      if (!state.valueFilters.length) state.valueFilters = [defaultValueFilter()];
      filterRows.innerHTML = state.valueFilters.map((filter, index) => {
        const disabled = VALUE_FILTERS_ENABLED ? "" : "disabled";
        const picSetOptions = filterPresetOptions().map((preset) => {
          const selected = preset.id === filter.picSet ? "selected" : "";
          return `<option value="${escapeHtml(preset.id)}" ${selected}>${escapeHtml(preset.label)}</option>`;
        }).join("");
        const elementOptions = filterPresetById(filter.picSet).columns.map((column) => {
          const selected = column === filter.element ? "selected" : "";
          return `<option value="${escapeHtml(column)}" ${selected}>${escapeHtml(column)}</option>`;
        }).join("");
        const removeDisabled = state.valueFilters.length === 1 ? "disabled" : "";

        return `
          <div class="filter-row" data-filter-index="${index}">
            <select data-filter-field="picSet" aria-label="PIC set" ${disabled}>${picSetOptions}</select>
            <select data-filter-field="element" aria-label="Element" ${disabled}>${elementOptions}</select>
            <input data-filter-field="lower" type="number" step="any" placeholder="Lower" value="${escapeHtml(filter.lower)}" aria-label="Lower" ${disabled}>
            <span class="range-mark">~</span>
            <input data-filter-field="upper" type="number" step="any" placeholder="Upper" value="${escapeHtml(filter.upper)}" aria-label="Upper" ${disabled}>
            <button class="icon-action close-action" data-filter-remove="${index}" type="button" aria-label="Remove value filter" ${removeDisabled || disabled}></button>
          </div>
        `;
      }).join("");
      addFilterRow.disabled = !VALUE_FILTERS_ENABLED;

      filterRows.querySelectorAll("[data-filter-field]").forEach((field) => {
        field.addEventListener("change", handleFilterFieldChange);
        field.addEventListener("input", handleFilterFieldChange);
      });

      filterRows.querySelectorAll("[data-filter-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.filterRemove);
          state.valueFilters.splice(index, 1);
          if (!state.valueFilters.length) state.valueFilters = [defaultValueFilter()];
          renderFilters();
          handleFilterSourceChange({ immediateViewer: true });
        });
      });
    }

    function handleFilterFieldChange(event) {
      const row = event.target.closest(".filter-row");
      const index = Number(row.dataset.filterIndex);
      const field = event.target.dataset.filterField;
      const filter = state.valueFilters[index];
      filter[field] = event.target.value;

      if (field === "picSet") {
        const preset = filterPresetById(filter.picSet);
        filter.element = preset.columns[0] || "";
        renderFilters();
      }

      handleFilterSourceChange({ immediateViewer: event.type === "change" });
    }

    function handleFilterSourceChange({ immediateViewer = false } = {}) {
      updateFilterSummary();
      renderUrl();
      state.offset = 0;
      state.total = 0;
      state.searchRows = [];
      state.viewerRows = [];
      state.viewerRequestId += 1;
      updatePager(0);
      renderTableMessage("No preview loaded.");
      if (!state.viewerOpen) return;
      if (immediateViewer) {
        refreshViewerRows();
      } else {
        scheduleViewerRefresh();
      }
    }

    function scheduleViewerRefresh() {
      window.clearTimeout(valueFilterRefreshTimer);
      valueFilterRefreshTimer = window.setTimeout(() => {
        if (state.viewerOpen) refreshViewerRows();
      }, 350);
    }

    function updateFilterSummary() {
      if (!VALUE_FILTERS_ENABLED) {
        filterSummary.textContent = "detached";
        renderViewerFilterSummary();
        return;
      }
      const activeCount = activeValueFilters().length;
      filterSummary.textContent = `${activeCount} active`;
      renderViewerFilterSummary();
    }

    function viewerFilterDisplayItems() {
      if (!VALUE_FILTERS_ENABLED) return [];
      return state.valueFilters
        .filter((filter) => filter.element && (filter.upper !== "" || filter.lower !== ""))
        .map((filter) => ({
          picSet: filterPresetById(filter.picSet).label,
          element: filter.element,
          upper: filter.upper,
          lower: filter.lower
        }));
    }

    function renderViewerFilterSummary() {
      if (!viewerFilterSummaryBar || !viewerFilterChips) return;
      const shouldShow = IS_VIEWER_PAGE && !IS_EMBEDDED_VIEWER;
      viewerFilterSummaryBar.hidden = !shouldShow;
      if (!shouldShow) return;

      if (!VALUE_FILTERS_ENABLED) {
        viewerFilterChips.innerHTML = `<span class="viewer-filter-empty">Filter detached</span>`;
        return;
      }

      const items = viewerFilterDisplayItems();
      const timeChip = `
        <span class="viewer-filter-chip viewer-time-chip">
          <strong>Time Range</strong>
          <span>${escapeHtml(timeModeLabel())}</span>
          <span>${escapeHtml(timeRangeLabel())}</span>
        </span>
      `;

      const valueChips = items.map((item) => {
        const range = valueFilterRangeLabel(item);
        return `
          <span class="viewer-filter-chip">
            <strong>${escapeHtml(item.picSet)}</strong>
            <span>${escapeHtml(item.element)}</span>
            <span>${escapeHtml(range)}</span>
          </span>
        `;
      }).join("");

      viewerFilterChips.innerHTML = `${timeChip}${valueChips}`;
    }

    function valueFilterRangeLabel(filter) {
      const hasLower = filter.lower !== "";
      const hasUpper = filter.upper !== "";
      if (hasLower && hasUpper) return `${filter.lower} - ${filter.upper}`;
      if (hasLower) return `>= ${filter.lower}`;
      if (hasUpper) return `<= ${filter.upper}`;
      return "All values";
    }

    function timeModeLabel() {
      return selectedTimeMode() === "received" ? "Received time" : "PIC time";
    }

    function timeRangeLabel() {
      const start = formatViewerDateTime(startDate.value, startTime.value);
      const end = formatViewerDateTime(endDate.value, endTime.value);
      if (start && end) return `${start} - ${end}`;
      if (start) return `from ${start}`;
      if (end) return `until ${end}`;
      return "All time";
    }

    function formatViewerDateTime(dateValue, timeValue) {
      if (!dateValue && !timeValue) return "";
      const dateText = dateValue ? dateValue.replaceAll("-", "/") : "----/--/--";
      return `${dateText} ${timeValue || "00:00"}`;
    }

    function renderUrl() {
      const dataset = currentDataset();
      state.downloadUrl = `${cleanApiBase()}${dataset.endpoint}?${queryParams({
        limit: displayLimit(),
        offset: 0,
        download: true
      })}`;
    }

    function queryParams({ limit, offset, download, valueColumns = [], exactTotal = true }) {
      const params = new URLSearchParams();
      const timeMode = selectedTimeMode();
      const start = combineDateTime(startDate.value, startTime.value);
      const end = combineDateTime(endDate.value, endTime.value);
      if (timeMode === "received") {
        if (start) params.set("received_start", start);
        if (end) params.set("received_end", end);
      } else {
        if (start) params.set("start", start);
        if (end) params.set("end", end);
      }
      if (gseSelect.value) params.set("gse", gseSelect.value);
      params.set("limit", String(limit));
      params.set("offset", String(offset));
      params.set("order", orderSelect.value);
      params.set("decoder", decoderSelect.value);
      const valueFilters = activeValueFilters();
      if (VALUE_FILTERS_ENABLED && valueFilters.length) params.set("value_filters", JSON.stringify(valueFilters));
      if (valueColumns.length) params.set("value_columns", JSON.stringify(valueColumns));
      if (!exactTotal) params.set("exact_total", "0");
      if (download) {
        params.set("raw", downloadModeSelect.value === "raw" ? "1" : "0");
        params.set("gse_report", downloadModeSelect.value === "gse" ? "1" : "0");
      }
      return params.toString();
    }

    function activeValueFilters() {
      if (!VALUE_FILTERS_ENABLED) return [];
      return state.valueFilters
        .filter((filter) => filter.element && (filter.upper !== "" || filter.lower !== ""))
        .map((filter) => ({
          pic_set: filterPresetById(filter.picSet).label,
          element: filter.element,
          upper: filter.upper,
          lower: filter.lower
        }));
    }

    function activeValueFilterElements() {
      if (!VALUE_FILTERS_ENABLED) return [];
      return [...new Set(activeValueFilters().map((filter) => filter.element))];
    }

    function handleDownloadSourceChange() {
      renderUrl();
      renderViewerFilterSummary();
      if (IS_VIEWER_CONTROLS_EMBED) {
        scheduleEmbeddedViewerState();
      } else if (state.viewerOpen) {
        refreshViewerRows();
      }
    }

    function openViewerPage() {
      renderUrl();
      const payload = collectViewerPageState();
      try {
        sessionStorage.setItem(VIEWER_STATE_KEY, JSON.stringify(payload));
      } catch {
        // URL parameters below carry the essential state if sessionStorage is unavailable.
      }
      window.location.href = viewerPageUrl(payload);
    }

    function collectViewerPageState() {
      return {
        dataset: state.dataset,
        apiBase: apiBase.value,
        decoder: decoderSelect.value,
        downloadMode: downloadModeSelect.value,
        gse: gseSelect.value,
        limit: limitInput.value,
        order: orderSelect.value,
        timeMode: selectedTimeMode(),
        startDate: startDate.value,
        startTime: startTime.value,
        endDate: endDate.value,
        endTime: endTime.value,
        valueFilters: state.valueFilters,
        viewer: {
          x: viewerXAxis.value,
          y: viewerYAxis.value,
          ySeries: [...state.viewerYSeries],
          y2Series: [...state.viewerY2Series],
          normalizeMode: viewerNormalizeMode.value,
          graphType: viewerGraphType.value,
          xMin: viewerXMin.value,
          xMax: viewerXMax.value,
          yMin: viewerYMin.value,
          yMax: viewerYMax.value
        }
      };
    }

    function viewerPageUrl(payload, options = {}) {
      const url = new URL("viewer.html", window.location.href);
      const params = url.searchParams;
      params.set("dataset", payload.dataset);
      params.set("api_base", payload.apiBase);
      params.set("decoder", payload.decoder);
      params.set("download_mode", payload.downloadMode);
      params.set("gse", payload.gse);
      params.set("limit", payload.limit);
      params.set("order", payload.order);
      params.set("time_mode", payload.timeMode);
      params.set("start_date", payload.startDate);
      params.set("start_time", payload.startTime);
      params.set("end_date", payload.endDate);
      params.set("end_time", payload.endTime);
      params.set("filters", JSON.stringify(payload.valueFilters));
      params.set("x", payload.viewer.x);
      params.set("y", payload.viewer.y);
      params.set("y1_extra", JSON.stringify(payload.viewer.ySeries));
      params.set("y2", JSON.stringify(payload.viewer.y2Series));
      params.set("normalize", payload.viewer.normalizeMode || "none");
      params.set("graph", payload.viewer.graphType);
      params.set("x_min", payload.viewer.xMin);
      params.set("x_max", payload.viewer.xMax);
      params.set("y_min", payload.viewer.yMin);
      params.set("y_max", payload.viewer.yMax);
      if (options.embeddedMode) {
        params.set("embedded", options.embeddedMode);
      } else if (options.embedded) {
        params.set("embedded", "1");
      }
      if (options.chartId) params.set("chart_id", String(options.chartId));
      return url.toString();
    }

    function addViewerChartFrame() {
      if (!viewerAdditionalChartControls || !viewerAdditionalCharts) return;
      renderUrl();
      const chartId = state.viewerAddedChartCount + 2;
      state.viewerAddedChartCount += 1;
      const payload = collectViewerPageState();
      const controlCard = document.createElement("section");
      controlCard.className = "viewer-added-chart-control";
      const graphCard = document.createElement("section");
      graphCard.className = "viewer-added-chart";

      const controlHead = addedChartHead(chartId, true, payload.viewer?.normalizeMode || "none");
      const graphHead = addedChartHead(chartId, false);

      const controlFrame = document.createElement("iframe");
      controlFrame.className = "viewer-chart-frame viewer-control-frame";
      controlFrame.title = `Viewer chart ${chartId} parameters`;
      controlFrame.loading = "lazy";
      controlFrame.src = viewerPageUrl(payload, { embeddedMode: "controls", chartId });

      const graphFrame = document.createElement("iframe");
      graphFrame.className = "viewer-chart-frame viewer-graph-frame";
      graphFrame.title = `Viewer chart ${chartId} graph`;
      graphFrame.loading = "lazy";
      graphFrame.src = viewerPageUrl(payload, { embeddedMode: "graph", chartId });

      const chartRecord = { controlCard, graphCard, graphFrame, payload };
      state.viewerAddedCharts.set(String(chartId), chartRecord);

      controlHead.removeButton.addEventListener("click", () => {
        controlCard.remove();
        graphCard.remove();
        state.viewerAddedCharts.delete(String(chartId));
      });
      if (controlHead.normalizeSelect) {
        controlHead.normalizeSelect.addEventListener("change", () => {
          const chart = state.viewerAddedCharts.get(String(chartId));
          if (!chart) return;
          const nextPayload = {
            ...chart.payload,
            viewer: {
              ...chart.payload.viewer,
              normalizeMode: controlHead.normalizeSelect.value
            }
          };
          chart.payload = nextPayload;
          controlFrame.src = viewerPageUrl(nextPayload, { embeddedMode: "controls", chartId });
          graphFrame.src = viewerPageUrl(nextPayload, { embeddedMode: "graph", chartId });
        });
      }

      controlCard.append(controlHead.element, controlFrame);
      graphCard.append(graphHead.element, graphFrame);
      viewerAdditionalChartControls.append(controlCard);
      viewerAdditionalCharts.append(graphCard);
    }

    function addedChartHead(chartId, removable, normalizeMode = "") {
      const element = document.createElement("div");
      element.className = "viewer-added-chart-head";
      const title = document.createElement("span");
      title.textContent = `Chart ${chartId}`;
      let normalizeSelect = null;
      if (normalizeMode) {
        const tools = document.createElement("div");
        tools.className = "viewer-added-chart-head-tools";
        const normalizeLabel = document.createElement("label");
        normalizeLabel.className = "viewer-normalize-control";
        normalizeLabel.textContent = "Normalize";
        normalizeSelect = document.createElement("select");
        [
          ["none", "None"],
          ["minmax", "0-1"],
          ["symmetric", "-1-1"]
        ].forEach(([value, label]) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = label;
          option.selected = value === normalizeMode;
          normalizeSelect.append(option);
        });
        normalizeLabel.append(normalizeSelect);
        tools.append(normalizeLabel);
        element.append(title, tools);
      } else {
        element.append(title);
      }
      const removeButton = document.createElement("button");
      removeButton.className = "icon-action close-action";
      removeButton.type = "button";
      removeButton.setAttribute("aria-label", `Remove chart ${chartId}`);
      removeButton.hidden = !removable;
      element.append(removeButton);
      return { element, removeButton, normalizeSelect };
    }

    function handleViewerChartMessage(event) {
      const message = event.data || {};
      if (message.type !== "sband-viewer-chart-state") return;
      const chartId = String(message.chartId || "");
      const chart = state.viewerAddedCharts.get(chartId);
      if (!chart || !message.payload || !message.payload.viewer) return;
      const previousGraphType = chart.payload?.viewer?.graphType;
      const nextPayload = message.mode === "controls" && previousGraphType
        ? {
          ...message.payload,
          viewer: {
            ...message.payload.viewer,
            graphType: previousGraphType
          }
        }
        : message.payload;
      chart.payload = nextPayload;
      if (message.mode !== "graph") {
        chart.graphFrame.src = viewerPageUrl(nextPayload, { embeddedMode: "graph", chartId });
      }
    }

    let embeddedViewerStateTimer = null;

    function scheduleEmbeddedViewerState() {
      if (!IS_VIEWER_CONTROLS_EMBED) return;
      window.clearTimeout(embeddedViewerStateTimer);
      embeddedViewerStateTimer = window.setTimeout(emitEmbeddedViewerState, 0);
    }

    function emitEmbeddedViewerState() {
      if (!IS_EMBEDDED_VIEWER || window.parent === window) return;
      renderUrl();
      window.parent.postMessage({
        type: "sband-viewer-chart-state",
        mode: VIEWER_EMBED_MODE,
        chartId: VIEWER_URL_PARAMS.get("chart_id") || "",
        payload: collectViewerPageState()
      }, "*");
    }

    function readViewerPageState() {
      let payload = {};
      if (!IS_EMBEDDED_VIEWER) {
        try {
          payload = JSON.parse(sessionStorage.getItem(VIEWER_STATE_KEY) || "{}") || {};
        } catch {
          payload = {};
        }
      }

      const params = new URLSearchParams(window.location.search);
      const queryPayload = {};
      if (params.has("dataset")) queryPayload.dataset = params.get("dataset");
      if (params.has("api_base")) queryPayload.apiBase = params.get("api_base");
      if (params.has("decoder")) queryPayload.decoder = params.get("decoder");
      if (params.has("download_mode")) queryPayload.downloadMode = params.get("download_mode");
      if (params.has("gse")) queryPayload.gse = params.get("gse");
      if (params.has("limit")) queryPayload.limit = params.get("limit");
      if (params.has("order")) queryPayload.order = params.get("order");
      if (params.has("time_mode")) queryPayload.timeMode = params.get("time_mode");
      if (params.has("start_date")) queryPayload.startDate = params.get("start_date");
      if (params.has("start_time")) queryPayload.startTime = params.get("start_time");
      if (params.has("end_date")) queryPayload.endDate = params.get("end_date");
      if (params.has("end_time")) queryPayload.endTime = params.get("end_time");
      if (params.has("filters")) queryPayload.valueFilters = parseJsonParam(params.get("filters"), []);

      const queryViewer = {};
      if (params.has("x")) queryViewer.x = params.get("x");
      if (params.has("y")) queryViewer.y = params.get("y");
      if (params.has("y1_extra")) queryViewer.ySeries = parseJsonParam(params.get("y1_extra"), []);
      if (params.has("y2")) queryViewer.y2Series = parseJsonParam(params.get("y2"), []);
      if (params.has("normalize")) queryViewer.normalizeMode = params.get("normalize");
      if (params.has("graph")) queryViewer.graphType = params.get("graph");
      if (params.has("x_min")) queryViewer.xMin = params.get("x_min");
      if (params.has("x_max")) queryViewer.xMax = params.get("x_max");
      if (params.has("y_min")) queryViewer.yMin = params.get("y_min");
      if (params.has("y_max")) queryViewer.yMax = params.get("y_max");

      return {
        ...payload,
        ...queryPayload,
        viewer: {
          ...(payload.viewer || {}),
          ...queryViewer
        }
      };
    }

    function parseJsonParam(value, fallback) {
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    function applyViewerPageState(payload) {
      if (payload.dataset && datasets[payload.dataset]) {
        state.dataset = payload.dataset;
      }
      state.presetId = datasets[state.dataset].presets[0].id;
      state.selectedColumns = new Set(datasets[state.dataset].presets[0].columns);
      if (Array.isArray(payload.valueFilters) && payload.valueFilters.length) {
        state.valueFilters = payload.valueFilters.map((filter) => ({
          picSet: filter.picSet || filter.pic_set || defaultValueFilter().picSet,
          element: filter.element || "",
          lower: filter.lower ?? "",
          upper: filter.upper ?? ""
        }));
      } else {
        state.valueFilters = [defaultValueFilter()];
      }

      setInputValue(apiBase, payload.apiBase);
      setSelectValue(downloadModeSelect, payload.downloadMode);
      setSelectValue(gseSelect, payload.gse);
      setInputValue(limitInput, payload.limit);
      setSelectValue(orderSelect, payload.order);
      setInputValue(startDate, payload.startDate);
      setInputValue(startTime, payload.startTime);
      setInputValue(endDate, payload.endDate);
      setInputValue(endTime, payload.endTime);
      setTimeMode(payload.timeMode);
      setSelectValue(decoderSelect, payload.decoder);

      tabs.forEach((item) => {
        item.setAttribute("aria-selected", String(item.dataset.dataset === state.dataset));
      });
      state.viewerOpen = true;
      state.viewerRows = [];
      state.viewerRequestId += 1;
      state.viewerHiddenSeries.clear();
      viewerPanel.hidden = false;
      viewerToggle.textContent = "Back";
      viewerToggle.setAttribute("aria-expanded", "true");
      viewerToggle.classList.remove("primary");
      document.title = "S-band Viewer";
      const title = document.querySelector("h1");
      if (title) title.textContent = "S-band Viewer";
    }

    function applyViewerControls(viewerState = {}) {
      if (viewerState.normalizeMode) setSelectValue(viewerNormalizeMode, viewerState.normalizeMode);
      if (viewerState.graphType) setSelectValue(viewerGraphType, viewerState.graphType);
      if (viewerState.x && [...viewerXAxis.options].some((option) => option.value === viewerState.x)) {
        viewerXAxis.value = viewerState.x;
      }
      if (viewerState.y && [...viewerYAxis.options].some((option) => option.value === viewerState.y)) {
        viewerYAxis.value = viewerState.y;
      }
      state.viewerYSeries = Array.isArray(viewerState.ySeries) ? viewerState.ySeries.filter(Boolean) : [];
      state.viewerY2Series = Array.isArray(viewerState.y2Series) ? viewerState.y2Series.filter(Boolean) : [];
      setInputValue(viewerXMin, viewerState.xMin);
      setInputValue(viewerXMax, viewerState.xMax);
      setInputValue(viewerYMin, viewerState.yMin);
      setInputValue(viewerYMax, viewerState.yMax);
      [viewerXMin, viewerXMax, viewerYMin, viewerYMax].forEach((input) => {
        if (input.value) delete input.dataset.autoValue;
      });
      renderViewerControls();
      renderViewer();
      scheduleEmbeddedViewerState();
    }

    function selectedTimeMode() {
      return document.querySelector("input[name='timeMode']:checked")?.value || "pic";
    }

    function setTimeMode(value) {
      const nextValue = value === "received" ? "received" : "pic";
      document.querySelectorAll("input[name='timeMode']").forEach((input) => {
        input.checked = input.value === nextValue;
      });
    }

    function setInputValue(input, value) {
      if (value !== undefined && value !== null) input.value = value;
    }

    function setSelectValue(select, value) {
      if (value === undefined || value === null) return;
      if ([...select.options].some((option) => option.value === value)) {
        select.value = value;
      }
    }

    function handleViewerAxisChange() {
      clearViewerRanges();
      state.viewerHiddenSeries.clear();
      const yColumns = viewerYColumnsForCurrentMode();
      renderViewerYSeriesControls(yColumns);
      renderViewerY2SeriesControls(yColumns);
      updateViewerAxisDisplay();
      if (IS_VIEWER_CONTROLS_EMBED) {
        renderViewer();
        scheduleEmbeddedViewerState();
        return;
      }
      refreshViewerRows();
    }

    function handleViewerY2PrimaryChange() {
      clearViewerRanges();
      state.viewerHiddenSeries.clear();
      if (viewerY2PrimaryAxis.value) {
        state.viewerY2Series[0] = viewerY2PrimaryAxis.value;
      } else {
        state.viewerY2Series = [];
      }
      const yColumns = viewerYColumnsForCurrentMode();
      renderViewerY2SeriesControls(yColumns);
      updateViewerAxisDisplay();
      if (IS_VIEWER_CONTROLS_EMBED) {
        renderViewer();
        scheduleEmbeddedViewerState();
        return;
      }
      refreshViewerRows();
    }

    function resetViewerRangeToAuto() {
      clearViewerRanges();
      renderViewer();
    }

    function clearViewerRanges() {
      [viewerXMin, viewerXMax, viewerYMin, viewerYMax].forEach((input) => {
        input.value = "";
        delete input.dataset.autoValue;
        input.classList.remove("invalid");
      });
      state.viewerDragState = null;
      updateViewerZoomStatus(null);
    }

    function combineDateTime(dateValue, timeValue) {
      if (!dateValue) return "";
      return `${dateValue}T${timeValue || "00:00"}:00+00:00`;
    }

      try {
        const response = await fetch(PIC_SET_LABELS_URL, { cache: "no-store" });

        const data = await response.json();
        picSetLabels = { ...DEFAULT_PIC_SET_LABELS, ...(data.pic_sets || {}) };
      } catch {
        picSetLabels = { ...DEFAULT_PIC_SET_LABELS };
      }
      applyPicSetLabels();

    async function loadValueColumns() {
      try {
        const response = await fetch(VALUE_COLUMNS_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        valueColumns = await response.json();
      } catch {
        valueColumns = {};

    }

    function applyPicSetLabels() {

      };
      mainGroups.forEach(applyLabel);
      adcsGroups.forEach(applyLabel);
      datasets.main.presets.forEach(applyLabel);
      datasets.realtime.presets.forEach(applyLabel);

    function renderSampleTable() {
      state.searchRows = [];
      state.viewerRows = [];

    async function searchRows() {
      const columns = previewColumnsForDataset();
      sampleHeader.innerHTML = columns.map((column) => `<th>${escapeHtml(column)}</th>`).join("");
      rowsBody.innerHTML = `<tr><td colspan="${columns.length}">Loading...</td></tr>`;

      try {
        const limit = displayLimit();
        state.offset = Math.min(state.offset, maxOffsetForLimit(limit));
        const pageLimit = Math.min(PAGE_SIZE, Math.max(limit - state.offset, 1));
        const response = await fetch(`${cleanApiBase()}${currentDataset().readEndpoint}?${queryParams({
          limit: pageLimit,
          offset: state.offset,
          download: false,
          exactTotal: !activeValueFilters().length
        })}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        state.total = Math.min(data.total || 0, limit);
        renderRows(data.rows || []);
        updatePager((data.rows || []).length);
        if (state.viewerOpen) refreshViewerRows();
      } catch (error) {
        state.searchRows = [];
        state.viewerRows = [];
        state.viewerRequestId += 1;
        rowsBody.innerHTML = `<tr><td colspan="${columns.length}">Failed: ${escapeHtml(error.message)}</td></tr>`;
        renderViewerControls();
        renderViewer();
        updatePager(0);
      }
    }

    function renderRows(rows) {
      const columns = previewColumnsForDataset();
      sampleHeader.innerHTML = columns.map((column) => `<th>${escapeHtml(column)}</th>`).join("");
      state.searchRows = rows.map((row, index) => normalizedSearchRow(row, columns, index));
      if (!rows.length) {
        rowsBody.innerHTML = `<tr><td colspan="${columns.length}">No rows found.</td></tr>`;
        renderViewerControls();
        renderViewer();
        return;
      }
      rowsBody.innerHTML = state.searchRows.map((row) => {
        return `<tr>${columns.map((column) => `<td>${escapeHtml(row[column] ?? "")}</td>`).join("")}</tr>`;
      }).join("");
      renderViewerControls();
      renderViewer();
    }

    function normalizedSearchRow(row, columns, index) {
      return columns.reduce((result, column) => {
        result[column] = Object.prototype.hasOwnProperty.call(row, column)
          ? row[column]
          : "";
        return result;
      }, {});
    }

    function renderViewerControls() {
      const columns = viewerColumnsForDataset();
      const xColumns = columns.length ? columns : ["row_index"];
      const allYColumns = columns.length ? columns : ["row_index"];
      const yColumns = normalizeEnabled() ? normalizedSelectableYColumns(allYColumns) : allYColumns;
      const effectiveYColumns = yColumns.length ? yColumns : allYColumns;
      const previousX = viewerXAxis.value;
      const previousY = viewerYAxis.value;
      const defaultX = defaultViewerXColumn(xColumns);
      const defaultY = defaultViewerYColumn(effectiveYColumns);

      viewerXAxis.innerHTML = xColumns.map((column) => `<option value="${escapeHtml(column)}">${escapeHtml(column)}</option>`).join("");
      viewerYAxis.innerHTML = effectiveYColumns.map((column) => `<option value="${escapeHtml(column)}">${escapeHtml(column)}</option>`).join("");
      viewerY2PrimaryAxis.innerHTML = [
        `<option value="">None</option>`,
        ...effectiveYColumns.map((column) => `<option value="${escapeHtml(column)}">${escapeHtml(column)}</option>`)
      ].join("");
      viewerXAxis.value = xColumns.includes(previousX) ? previousX : defaultX;
      viewerYAxis.value = effectiveYColumns.includes(previousY) ? previousY : defaultY;
      if ((previousX && viewerXAxis.value !== previousX) || (previousY && viewerYAxis.value !== previousY)) {
        clearViewerRanges();
      }
      renderViewerYSeriesControls(effectiveYColumns);
      renderViewerY2SeriesControls(effectiveYColumns);
      updateViewerAxisDisplay();
    }

    function selectedYColumns() {
      return [viewerYAxis.value, ...state.viewerYSeries].filter(Boolean);

    function selectedY2Columns() {

      if (!viewerYSeriesList) return;

      const defaultY = defaultViewerYColumn(y1Options);
      state.viewerYSeries = state.viewerYSeries.map((column) => {
        return y1Options.includes(column) ? column : defaultY;
      });
      viewerYSeriesList.innerHTML = state.viewerYSeries.map((column, index) => {
        const label = `Y1-${index + 2}`;
        const unit = unitLabel(column);
        const options = y1Options.map((yColumn) => {
          const selected = yColumn === column ? "selected" : "";
          return `<option value="${escapeHtml(yColumn)}" ${selected}>${escapeHtml(yColumn)}</option>`;
        }).join("");
        return `
          <div class="viewer-y-series-row" data-viewer-y-series-index="${index}">
            <span class="viewer-y-series-label">${escapeHtml(label)}</span>
            <select data-viewer-y-series-select="${index}" aria-label="${label} axis">${options}</select>
            <span class="viewer-axis-unit">${escapeHtml(unit)}</span>

          </div>

      viewerYSeriesList.querySelectorAll("[data-viewer-y-series-select]").forEach((select) => {
        select.addEventListener("change", () => {

        button.addEventListener("click", () => {

    function renderViewerY2SeriesControls(yColumns) {

      if (!firstY2 || !yColumns.includes(firstY2)) {

      const defaultY2 = defaultAdditionalViewerY2Column(y2GroupedOptions);
      state.viewerY2Series = state.viewerY2Series.map((column, index) => {
        if (index === 0) return yColumns.includes(column) ? column : firstY2;
        return y2GroupedOptions.includes(column) ? column : defaultY2;
      });
      updateViewerY2AxisVisibility();
      viewerY2PrimaryAxis.value = state.viewerY2Series[0];
      updateViewerUnitLabel(viewerY2Unit, state.viewerY2Series[0]);

      viewerY2SeriesList.innerHTML = state.viewerY2Series.slice(1).map((column, index) => {
        const seriesIndex = index + 1;

        const options = y2GroupedOptions.map((yColumn) => {
          const selected = yColumn === column ? "selected" : "";
          return `<option value="${escapeHtml(yColumn)}" ${selected}>${escapeHtml(yColumn)}</option>`;
        }).join("");
        return `
          <div class="viewer-y-series-row" data-viewer-y2-series-index="${seriesIndex}">
            <span class="viewer-y-series-label">${escapeHtml(label)}</span>
            <select data-viewer-y2-series-select="${seriesIndex}" aria-label="${label} axis">${options}</select>
            <span class="viewer-axis-unit">${escapeHtml(unit)}</span>

          </div>
        `;

      viewerY2SeriesList.querySelectorAll("[data-viewer-y2-series-select]").forEach((select) => {
        select.addEventListener("change", () => {
          const index = Number(select.dataset.viewerY2SeriesSelect);

          updateViewerAxisDisplay();
          renderViewer();

      viewerY2SeriesList.querySelectorAll("[data-viewer-y2-series-remove]").forEach((button) => {
        button.addEventListener("click", () => {

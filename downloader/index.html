    function defaultAdditionalViewerYColumn(yColumns) {
      const selected = new Set(selectedYColumns());
      const available = yColumns.filter((column) => !selected.has(column));
      return defaultViewerYColumn(available.length ? available : yColumns);
    }

    function defaultAdditionalViewerY2Column(yColumns) {
      const selected = new Set([...selectedYColumns(), ...selectedY2Columns()]);
      const available = yColumns.filter((column) => !selected.has(column));
      return defaultViewerYColumn(available.length ? available : yColumns);
    }

    function normalizeEnabled() {
      return viewerNormalizeMode.value !== "none";
    }

    function viewerYColumnsForCurrentMode() {
      const columns = viewerColumnsForDataset();
      const yColumns = columns.length ? columns : ["row_index"];
      if (!normalizeEnabled()) return yColumns;
      const normalizedColumns = normalizedSelectableYColumns(yColumns);
      return normalizedColumns.length ? normalizedColumns : yColumns;
    }

    function normalizedSelectableYColumns(columns) {
      return columns.filter((column) => !isTimeColumn(column));
    }

    function yAxisOptionColumns(columns, referenceColumn) {
      if (normalizeEnabled()) {
        const normalizedColumns = normalizedSelectableYColumns(columns);
        return normalizedColumns.length ? normalizedColumns : columns;
      }
      const sameUnit = sameUnitColumns(columns, referenceColumn);
      return sameUnit.length ? sameUnit : columns;
    }

    function sameUnitColumns(columns, referenceColumn) {
      const referenceUnit = unitLabel(referenceColumn);
      return columns.filter((column) => unitLabel(column) === referenceUnit);
    }

    function defaultViewerXColumn(columns) {
      const preferred = state.dataset === "adcs"
        ? ["timestamp_adcs", "received_time", "ADCS TIME", "TAI_SECONDS"]
        : ["timestamp_obc", "received_time", "timestamp_fab", "timestamp_reset"];
      return preferred.find((column) => columns.includes(column)) || columns[0];
    }

    function defaultViewerYColumn(columns) {
      const baseColumns = new Set(basePreviewColumns());
      const preferred = [
        "voltage_raw",
        "voltage_raw_power",
        "voltage_battery",
        "current_raw",
        "current_battery",
        "temp_battery"
      ];
      const preferredColumn = preferred.find((column) => columns.includes(column));
      if (preferredColumn) return preferredColumn;
      const numericName = /voltage|current|temp|rssi|freq|angle|error|rate|speed|rpm|seconds|count|position|velocity|body_rate|hours|number/i;
      return columns.find((column) => !baseColumns.has(column) && !isTimeColumn(column) && numericName.test(column))
        || columns.find((column) => !baseColumns.has(column) && !isTimeColumn(column))
        || columns.find((column) => !baseColumns.has(column))
        || columns[0];
    }

    async function refreshViewerRows() {
      if (!state.viewerOpen) return;
      const requestId = state.viewerRequestId + 1;
      state.viewerRequestId = requestId;

      renderUrl();
      viewerStatus.textContent = "Loading CSV...";
      viewerChart.innerHTML = `<text class="viewer-empty" x="480" y="152">Loading CSV data...</text>`;

      try {
        const response = await fetch(state.downloadUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const csvText = await response.text();
        if (requestId !== state.viewerRequestId) return;
        state.viewerRows = parseCsvRows(csvText);
        renderViewer();
      } catch (error) {
        if (requestId !== state.viewerRequestId) return;
        state.viewerRows = [];
        viewerStatus.textContent = "0 rows";
        viewerChart.innerHTML = `<text class="viewer-empty" x="480" y="152">Failed: ${escapeHtml(error.message)}</text>`;
      }
    }

    function parseCsvRows(csvText) {
      const records = parseCsvRecords(csvText);
      if (records.length < 2) return [];
      const headers = records[0].map((header) => header.trim());
      return records.slice(1)
        .filter((record) => record.some((cell) => cell !== ""))
        .map((record) => {
          return headers.reduce((row, header, index) => {
            row[header] = record[index] ?? "";
            return row;
          }, {});
        });
    }

    function parseCsvRecords(csvText) {
      const records = [];
      let record = [];
      let field = "";
      let inQuotes = false;

      for (let index = 0; index < csvText.length; index += 1) {
        const char = csvText[index];
        const nextChar = csvText[index + 1];

        if (inQuotes) {
          if (char === "\"" && nextChar === "\"") {
            field += "\"";
            index += 1;
          } else if (char === "\"") {
            inQuotes = false;
          } else {
            field += char;
          }
          continue;
        }

        if (char === "\"") {
          inQuotes = true;
        } else if (char === ",") {
          record.push(field);
          field = "";
        } else if (char === "\n") {
          record.push(field);
          records.push(record);
          record = [];
          field = "";
        } else if (char !== "\r") {
          field += char;
        }
      }

      if (field !== "" || record.length) {
        record.push(field);
        records.push(record);
      }

      return records;
    }

    function viewerSelectedYColumns() {
      const columns = typeof selectedYColumns === "function" ? selectedYColumns() : [];
      const fallbackColumns = viewerYAxis.value ? [viewerYAxis.value] : [];
      const sourceColumns = Array.isArray(columns) && columns.length ? columns : fallbackColumns;
      return sourceColumns.filter((column) => String(column || "").trim());
    }

    function viewerSelectedY2Columns() {
      const columns = typeof selectedY2Columns === "function" ? selectedY2Columns() : [];
      return Array.isArray(columns)
        ? columns.filter((column) => String(column || "").trim())
        : [];
    }

    function viewerSeriesColor(index) {
      const colors = [
        "#2563eb",
        "#dc2626",
        "#16a34a",
        "#9333ea",
        "#ea580c",
        "#0891b2",
        "#be123c",
        "#4f46e5"
      ];
      return colors[index % colors.length];
    }

    function normalizeAxisLabel() {
      if (viewerNormalizeMode.value === "minmax") return "Normalized [0-1]";
      if (viewerNormalizeMode.value === "symmetric") return "Normalized [-1-1]";
      return "Normalized";
    }

    function normalizeSeriesPoints(points, mode) {
      if (mode === "none" || !points.length) return points;
      const values = points.map((point) => point.y);
      const min = Math.min(...values);
      const max = Math.max(...values);
      if (!Number.isFinite(min) || !Number.isFinite(max)) return points;

      if (mode === "minmax") {
        const span = max - min;
        return points.map((point) => ({
          ...point,
          y: span ? (point.y - min) / span : 0
        }));
      }

      if (mode === "symmetric") {
        const base = Math.max(Math.abs(min), Math.abs(max));
        return points.map((point) => ({
          ...point,
          y: base ? point.y / base : 0
        }));
      }

      return points;
    }

    function renderViewer() {
      if (!state.viewerOpen) return;
      state.viewerPlotState = null;
      updateViewerZoomStatus(null);

      const xColumn = viewerXAxis.value;
      const y1Columns = viewerSelectedYColumns();
      const y2Columns = viewerSelectedY2Columns();
      const yRangeColumn = y1Columns[0] || viewerYAxis.value;
      const y2RangeColumn = y2Columns[0] || yRangeColumn;
      const range = currentViewerRange(xColumn, yRangeColumn);
      if (range.invalidInputs.length) {
        range.invalidInputs.forEach((input) => input.classList.add("invalid"));
        viewerStatus.textContent = `Y1 ${y1Columns.length} / Y2 ${y2Columns.length} / invalid range`;
        viewerChart.innerHTML = `<text class="viewer-empty" x="480" y="172">Invalid range value.</text>`;
        return;
      }

      const seriesForColumns = (columns, axis, colorOffset) => columns.map((yColumn, seriesIndex) => {
        const axisLabelText = axis === "y2" ? `Y2-${seriesIndex + 1}` : `Y1-${seriesIndex + 1}`;
        const key = `${axis}:${seriesIndex}:${yColumn}`;
        const rawPoints = state.viewerRows
          .map((row, index) => ({
            x: numericOrTime(viewerValueForColumn(row, xColumn), index),
            y: viewerYValueForColumn(row, yColumn, index)
          }))
          .filter((point) => Number.isFinite(point.x) && Number.isFinite(point.y))
          .sort((a, b) => a.x - b.x);
        return {
          axis,
          axisLabelText,
          key,
          yColumn,
          hidden: state.viewerHiddenSeries.has(key),
          color: viewerSeriesColor(colorOffset + seriesIndex),
          points: normalizeSeriesPoints(rawPoints, viewerNormalizeMode.value)
        };
      });
      const y1Series = seriesForColumns(y1Columns, "y1", 0);
      const y2Series = seriesForColumns(y2Columns, "y2", y1Columns.length);
      const series = [...y1Series, ...y2Series];
      const seriesKeys = new Set(series.map((seriesItem) => seriesItem.key));
      state.viewerHiddenSeries.forEach((key) => {
        if (!seriesKeys.has(key)) state.viewerHiddenSeries.delete(key);
      });
      const graphableSeries = series.filter((seriesItem) => seriesItem.points.length);
      const activeGraphableSeries = graphableSeries.filter((seriesItem) => !seriesItem.hidden);
      const domainSeries = activeGraphableSeries.length ? activeGraphableSeries : graphableSeries;
      const allPoints = domainSeries.flatMap((seriesItem) => seriesItem.points);

      if (!graphableSeries.length) {
        viewerStatus.textContent = `Y1 ${y1Columns.length} / Y2 ${y2Columns.length} / 0 plotted / ${state.viewerRows.length} fetched`;
        viewerChart.innerHTML = `<text class="viewer-empty" x="480" y="172">No graphable values in planned CSV.</text>`;
        return;
      }

      const width = 960;
      const height = 340;
      const hasY2Axis = y2Columns.length > 0;
      const legendRows = Math.max(1, Math.ceil(series.length / 3));
      const plot = { left: 82, right: hasY2Axis ? 82 : 28, top: 28 + (legendRows - 1) * 18, bottom: 64 };
      const x0 = plot.left;
      const x1 = width - plot.right;
      const y0 = height - plot.bottom;
      const y1 = plot.top;
      const xValues = allPoints.map((point) => point.x);
      const [autoMinX, autoMaxX] = resolveAxisDomain(xValues, null, null, false);
      const [minX, maxX] = resolveAxisDomain(xValues, range.xMin, range.xMax, false);
      const graphableY1Series = y1Series.filter((seriesItem) => seriesItem.points.length);
      const graphableY2Series = y2Series.filter((seriesItem) => seriesItem.points.length);
      const activeY1Series = graphableY1Series.filter((seriesItem) => !seriesItem.hidden);
      const activeY2Series = graphableY2Series.filter((seriesItem) => !seriesItem.hidden);
      const y1DomainSeries = activeY1Series.length ? activeY1Series : graphableY1Series;
      const y2DomainSeries = activeY2Series.length ? activeY2Series : graphableY2Series;
      const y1Values = y1DomainSeries.flatMap((seriesItem) => seriesItem.points.map((point) => point.y));
      const y2Values = y2DomainSeries.flatMap((seriesItem) => seriesItem.points.map((point) => point.y));
      const y1DomainValues = y1Values.length ? y1Values : [0, 1];
      const includeZeroY1 = normalizeEnabled() ? false : shouldIncludeZeroForYAxis(y1Columns);
      const [autoMinY1, autoMaxY1] = resolveAxisDomain(y1DomainValues, null, null, includeZeroY1);
      const [minY1, maxY1] = resolveAxisDomain(y1DomainValues, range.yMin, range.yMax, includeZeroY1);
      updateAutoRangeInputs(xColumn, yRangeColumn, minX, maxX, minY1, maxY1);
      const y2Domain = hasY2Axis
        ? resolveAxisDomain(
          y2Values.length ? y2Values : [0, 1],
          null,
          null,
          normalizeEnabled() ? false : shouldIncludeZeroForYAxis(y2Columns)
        )
        : null;
      const [minY2, maxY2] = y2Domain || [minY1, maxY1];
      if (!isFiniteDomain(minX, maxX) || !isFiniteDomain(minY1, maxY1) || !isFiniteDomain(minY2, maxY2)) {
        viewerStatus.textContent = `Y1 ${y1Columns.length} / Y2 ${y2Columns.length} / invalid domain`;
        viewerChart.innerHTML = `<text class="viewer-empty" x="480" y="172">Unable to draw selected range.</text>`;
        return;
      }
      state.viewerPlotState = {
        xColumn,
        yColumn: yRangeColumn,
        minX,
        maxX,
        minY: minY1,
        maxY: maxY1,
        x0,
        x1,
        y0,
        y1,
        autoDomain: {
          minX: autoMinX,
          maxX: autoMaxX,
          minY: autoMinY1,
          maxY: autoMaxY1
        }
      };
      updateViewerZoomStatus(state.viewerPlotState);
      const scaleX = (value) => x0 + ((value - minX) / ((maxX - minX) || 1)) * (x1 - x0);
      const scaleY1 = (value) => y0 - ((value - minY1) / ((maxY1 - minY1) || 1)) * (y0 - y1);
      const scaleY2 = (value) => y0 - ((value - minY2) / ((maxY2 - minY2) || 1)) * (y0 - y1);
      const visibleSeries = graphableSeries.map((seriesItem) => {
        const isY2 = seriesItem.axis === "y2";
        const minY = isY2 ? minY2 : minY1;
        const maxY = isY2 ? maxY2 : maxY1;
        const scaleY = isY2 ? scaleY2 : scaleY1;
        return {
          ...seriesItem,
          scaleY,
          visiblePoints: seriesItem.points.filter((point) => {
            return point.x >= minX && point.x <= maxX && point.y >= minY && point.y <= maxY;
          })
        };
      });
      const activeVisibleSeries = visibleSeries.filter((seriesItem) => !seriesItem.hidden);
      const visiblePointCount = activeVisibleSeries.reduce((total, seriesItem) => {
        return total + seriesItem.visiblePoints.length;
      }, 0);
      const renderedDotLimit = 2400;
      const tooltipLimit = 6000;
      const renderedSeries = activeVisibleSeries.map((seriesItem) => ({
        ...seriesItem,
        renderedPoints: sampleVisiblePoints(seriesItem.visiblePoints, renderedDotLimit),
        tooltipPoints: sampleVisiblePoints(seriesItem.visiblePoints, tooltipLimit)
      }));
      const hiddenCount = visibleSeries.filter((seriesItem) => seriesItem.hidden).length;
      const statusHiddenText = hiddenCount ? `, ${hiddenCount} hidden` : "";
      viewerStatus.textContent = `Y1 ${y1Columns.length} / Y2 ${y2Columns.length} / ${visiblePointCount} plotted${statusHiddenText} / ${state.viewerRows.length} fetched`;

      const lines = viewerGraphType.value === "line"
        ? renderedSeries.map((seriesItem) => {
          const path = seriesItem.points.map((point, index) => {
            const x = scaleX(point.x);
            const y = seriesItem.scaleY(point.y);
            return Number.isFinite(x) && Number.isFinite(y)
              ? `${index ? "L" : "M"} ${x.toFixed(1)} ${y.toFixed(1)}`
              : "";
          }).filter(Boolean).join(" ");
          return path
            ? `<path class="viewer-line" style="stroke: ${seriesItem.color}" d="${path}"></path>`
            : "";
        }).join("")
        : "";
      const dots = renderedSeries.map((seriesItem) => {
        return seriesItem.renderedPoints.map((point) => {
          const x = scaleX(point.x);
          const y = seriesItem.scaleY(point.y);
          return Number.isFinite(x) && Number.isFinite(y)
            ? `<circle class="viewer-dot" style="fill: ${seriesItem.color}" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5"></circle>`
            : "";
        }).join("");
      }).join("");
      const tooltipPoints = renderedSeries.flatMap((seriesItem) => {
        return seriesItem.tooltipPoints.map((point) => ({
          seriesKey: seriesItem.key,
          seriesLabel: `${seriesItem.axisLabelText} ${seriesItem.yColumn}`,
          color: seriesItem.color,
          xValue: point.x,
          yValue: point.y,
          x: scaleX(point.x),
          y: seriesItem.scaleY(point.y),
          yColumn: seriesItem.yColumn
        }));
      }).filter((point) => Number.isFinite(point.x) && Number.isFinite(point.y));
      const xTicks = axisTicks(minX, maxX);
      const yTicks = axisTicks(minY1, maxY1);
      const y2Ticks = hasY2Axis ? axisTicks(minY2, maxY2) : [];
      const xGrid = xTicks.map((tick) => {
        const x = scaleX(tick).toFixed(1);
        return `<line class="viewer-grid" x1="${x}" y1="${y1}" x2="${x}" y2="${y0}"></line>`;
      }).join("");
      const yGrid = yTicks.map((tick) => {
        const y = scaleY1(tick).toFixed(1);
        return `<line class="viewer-grid" x1="${x0}" y1="${y}" x2="${x1}" y2="${y}"></line>`;
      }).join("");
      const xLabels = xTicks.map((tick, index) => {
        const anchor = index === 0 ? "start" : index === xTicks.length - 1 ? "end" : "middle";
        return `<text class="viewer-tick" x="${scaleX(tick).toFixed(1)}" y="${y0 + 22}" text-anchor="${anchor}">${escapeHtml(formatAxisTick(tick, xColumn))}</text>`;
      }).join("");
      const yLabels = yTicks.map((tick) => {
        return `<text class="viewer-tick" x="${x0 - 10}" y="${(scaleY1(tick) + 4).toFixed(1)}" text-anchor="end">${escapeHtml(formatAxisTick(tick, yRangeColumn))}</text>`;
      }).join("");
      const y2Labels = y2Ticks.map((tick) => {
        return `<text class="viewer-tick" x="${x1 + 10}" y="${(scaleY2(tick) + 4).toFixed(1)}" text-anchor="start">${escapeHtml(formatAxisTick(tick, y2RangeColumn))}</text>`;
      }).join("");
      const yAxisTitle = yAxisTitleForColumns(y1Columns.length ? y1Columns : [yRangeColumn]);
      const y2AxisTitle = yAxisTitleForColumns(y2Columns.length ? y2Columns : [y2RangeColumn]);
      const y2Axis = hasY2Axis
        ? `<line class="viewer-axis" x1="${x1}" y1="${y1}" x2="${x1}" y2="${y0}"></line>`
        : "";
      const y2Title = hasY2Axis
        ? `<text class="viewer-axis-title" transform="translate(${width - 18} ${(y0 + y1) / 2}) rotate(90)" text-anchor="middle">${escapeHtml(y2AxisTitle)}</text>`
        : "";
      const legend = viewerLegendMarkup(series, x0, 12);
      const emptyMessage = visiblePointCount
        ? ""
        : `<text class="viewer-empty" x="${(x0 + x1) / 2}" y="${(y0 + y1) / 2}">${
          escapeHtml(activeGraphableSeries.length ? "No values inside selected range." : "All series hidden.")
        }</text>`;
      Object.assign(state.viewerPlotState, {
        tooltipPoints,
        scaleX,
        scaleY1,
        scaleY2
      });

      viewerChart.innerHTML = `
        <defs>
          <clipPath id="viewerPlotClip">
            <rect x="${x0 - 6}" y="${y1 - 6}" width="${x1 - x0 + 12}" height="${y0 - y1 + 12}"></rect>
          </clipPath>
        </defs>
        ${legend}
        ${xGrid}
        ${yGrid}
        <line class="viewer-axis" x1="${x0}" y1="${y0}" x2="${x1}" y2="${y0}"></line>
        <line class="viewer-axis" x1="${x0}" y1="${y1}" x2="${x0}" y2="${y0}"></line>
        ${y2Axis}
        ${xLabels}
        ${yLabels}
        ${y2Labels}
        <text class="viewer-axis-title" x="${(x0 + x1) / 2}" y="${height - 15}" text-anchor="middle">${escapeHtml(axisLabel(xColumn))}</text>
        <text class="viewer-axis-title" transform="translate(18 ${(y0 + y1) / 2}) rotate(-90)" text-anchor="middle">${escapeHtml(yAxisTitle)}</text>
        ${y2Title}
        <g clip-path="url(#viewerPlotClip)">
          ${lines}
          ${dots}
          ${emptyMessage}
        </g>
        <g id="viewerHoverLayer"></g>
      `;
      scheduleEmbeddedViewerState();
    }

    function viewerLegendMarkup(series, startX, y) {
      return series.map((seriesItem, index) => {
        const row = Math.floor(index / 3);
        const column = index % 3;
        const x = startX + column * 245;
        const itemY = y + row * 18;
        const label = `${seriesItem.axisLabelText} ${shortColumnLabel(seriesItem.yColumn, 18)}`;
        const mutedClass = seriesItem.hidden ? " is-muted" : "";
        return `
          <g class="viewer-legend${mutedClass}" data-viewer-legend-key="${escapeHtml(seriesItem.key)}" transform="translate(${x} ${itemY})">
            <rect x="0" y="-9" width="12" height="12" fill="${seriesItem.color}" rx="2"></rect>
            <text x="18" y="1">${escapeHtml(label)}</text>
          </g>
        `;
      }).join("");
    }

    function shortColumnLabel(value, maxLength) {
      const text = String(value || "");
      return text.length > maxLength ? `${text.slice(0, Math.max(0, maxLength - 1))}...` : text;
    }

    function sampleVisiblePoints(points, maxCount) {
      if (points.length <= maxCount) return points;
      const step = points.length / maxCount;
      const sampled = [];
      for (let index = 0; index < maxCount; index += 1) {
        sampled.push(points[Math.floor(index * step)]);
      }
      return sampled;
    }

    function isFiniteDomain(min, max) {
      return Number.isFinite(min) && Number.isFinite(max) && min !== max;
    }

    function handleViewerChartWheel(event) {
      const plotState = state.viewerPlotState;
      if (!plotState) return;
      const point = viewerSvgPointFromEvent(event);
      if (!viewerPointInsidePlot(point, plotState)) return;
      event.preventDefault();

      const focusX = viewerValueFromSvgX(point.x, plotState);
      const focusY = viewerValueFromSvgY(point.y, plotState);
      const factor = Math.exp(Math.max(-240, Math.min(240, event.deltaY)) * 0.0015);
      const zoomXEnabled = !event.shiftKey || event.altKey;
      const zoomYEnabled = event.shiftKey || event.altKey;
      const zoomX = zoomXEnabled ? zoomViewerDomain(plotState.minX, plotState.maxX, focusX, factor) : [plotState.minX, plotState.maxX];
      const zoomY = zoomYEnabled ? zoomViewerDomain(plotState.minY, plotState.maxY, focusY, factor) : [plotState.minY, plotState.maxY];
      const [minX, maxX] = clampViewerDomain(zoomX[0], zoomX[1], plotState.autoDomain.minX, plotState.autoDomain.maxX);
      const [minY, maxY] = clampViewerDomain(zoomY[0], zoomY[1], plotState.autoDomain.minY, plotState.autoDomain.maxY);
      setViewerManualRange(minX, maxX, minY, maxY, plotState);
    }

    function handleViewerChartPointerDown(event) {
      const plotState = state.viewerPlotState;
      if (!plotState || event.button !== 0) return;
      const point = viewerSvgPointFromEvent(event);
      if (!viewerPointInsidePlot(point, plotState)) return;
      state.viewerDragState = {
        pointerId: event.pointerId,
        startPoint: point,
        startDomain: {
          minX: plotState.minX,
          maxX: plotState.maxX,
          minY: plotState.minY,
          maxY: plotState.maxY
        }
      };
      viewerChart.classList.add("is-panning");
      viewerChart.setPointerCapture(event.pointerId);
      hideViewerTooltip();
    }

    function handleViewerChartPointerMove(event) {
      const dragState = state.viewerDragState;
      const plotState = state.viewerPlotState;
      if (!plotState) return;
      const point = viewerSvgPointFromEvent(event);
      if (dragState && dragState.pointerId === event.pointerId) {
        const xSpan = dragState.startDomain.maxX - dragState.startDomain.minX;
        const ySpan = dragState.startDomain.maxY - dragState.startDomain.minY;
        const dx = (point.x - dragState.startPoint.x) / Math.max(1, plotState.x1 - plotState.x0) * xSpan;
        const dy = (point.y - dragState.startPoint.y) / Math.max(1, plotState.y0 - plotState.y1) * ySpan;
        const [minX, maxX] = clampViewerDomain(
          dragState.startDomain.minX - dx,
          dragState.startDomain.maxX - dx,
          plotState.autoDomain.minX,
          plotState.autoDomain.maxX
        );
        const [minY, maxY] = clampViewerDomain(
          dragState.startDomain.minY + dy,
          dragState.startDomain.maxY + dy,
          plotState.autoDomain.minY,
          plotState.autoDomain.maxY
        );
        setViewerManualRange(minX, maxX, minY, maxY, plotState);
        return;
      }
      showViewerTooltip(point);
    }

    function finishViewerChartPan(event) {
      const dragState = state.viewerDragState;
      if (dragState && (!event || event.pointerId === dragState.pointerId)) {
        state.viewerDragState = null;
        viewerChart.classList.remove("is-panning");
      }
    }

    function handleViewerChartClick(event) {
      const legend = event.target.closest("[data-viewer-legend-key]");
      if (!legend) return;
      const key = legend.dataset.viewerLegendKey;
      if (state.viewerHiddenSeries.has(key)) {
        state.viewerHiddenSeries.delete(key);
      } else {
        state.viewerHiddenSeries.add(key);
      }
      hideViewerTooltip();
      renderViewer();
    }

    function viewerSvgPointFromEvent(event) {
      const rect = viewerChart.getBoundingClientRect();
      const viewBox = viewerChart.viewBox.baseVal;
      return {
        x: viewBox.x + ((event.clientX - rect.left) / Math.max(1, rect.width)) * viewBox.width,
        y: viewBox.y + ((event.clientY - rect.top) / Math.max(1, rect.height)) * viewBox.height
      };
    }

    function viewerPointInsidePlot(point, plotState) {
      return point.x >= plotState.x0 && point.x <= plotState.x1 && point.y >= plotState.y1 && point.y <= plotState.y0;
    }

    function viewerValueFromSvgX(x, plotState) {
      const ratio = (x - plotState.x0) / Math.max(1, plotState.x1 - plotState.x0);
      return plotState.minX + ratio * (plotState.maxX - plotState.minX);
    }

    function viewerValueFromSvgY(y, plotState) {
      const ratio = (plotState.y0 - y) / Math.max(1, plotState.y0 - plotState.y1);
      return plotState.minY + ratio * (plotState.maxY - plotState.minY);
    }

    function zoomViewerDomain(min, max, focus, factor) {
      const minSpan = Math.max(Math.abs(max - min) / 1000000, 1e-9);
      const nextMin = focus - (focus - min) * factor;
      const nextMax = focus + (max - focus) * factor;
      if (Math.abs(nextMax - nextMin) < minSpan) {
        return [focus - minSpan / 2, focus + minSpan / 2];
      }
      return [nextMin, nextMax];
    }

    function clampViewerDomain(min, max, autoMin, autoMax) {
      if (!isFiniteDomain(autoMin, autoMax)) return [min, max];
      if (!Number.isFinite(min) || !Number.isFinite(max)) return [autoMin, autoMax];
      if (min > max) [min, max] = [max, min];
      const autoSpan = autoMax - autoMin;
      let span = max - min;
      if (!Number.isFinite(span) || span <= 0 || span >= autoSpan) return [autoMin, autoMax];
      if (min < autoMin) {
        max += autoMin - min;
        min = autoMin;
      }
      if (max > autoMax) {
        min -= max - autoMax;
        max = autoMax;
      }
      if (min < autoMin) min = autoMin;
      if (max > autoMax) max = autoMax;
      span = max - min;
      return span > 0 ? [min, max] : [autoMin, autoMax];
    }

    function setViewerManualRange(minX, maxX, minY, maxY, plotState = state.viewerPlotState) {
      if (!plotState) return;
      setManualRangeInput(viewerXMin, minX, plotState.xColumn);
      setManualRangeInput(viewerXMax, maxX, plotState.xColumn);
      setManualRangeInput(viewerYMin, minY, plotState.yColumn);
      setManualRangeInput(viewerYMax, maxY, plotState.yColumn);
      renderViewer();
    }

    function setManualRangeInput(input, value, column) {
      input.value = formatRangeInputValue(value, column);
      delete input.dataset.autoValue;
      input.classList.remove("invalid");
    }

    function showViewerTooltip(point) {
      const plotState = state.viewerPlotState;
      const layer = viewerChart.querySelector("#viewerHoverLayer");
      if (!plotState || !layer || !viewerPointInsidePlot(point, plotState)) {
        hideViewerTooltip();
        return;
      }
      const nearest = nearestViewerPoint(point, plotState.tooltipPoints || []);
      if (!nearest || nearest.distance > 18) {
        hideViewerTooltip();
        return;
      }

      const tooltipWidth = 260;
      const tooltipHeight = 58;
      const tooltipX = Math.min(plotState.x1 - tooltipWidth, Math.max(plotState.x0, nearest.x + 12));
      const tooltipY = Math.min(plotState.y0 - tooltipHeight, Math.max(plotState.y1, nearest.y - tooltipHeight - 8));
      const xText = formatAxisTick(nearest.xValue, plotState.xColumn);
      const yText = formatAxisTick(nearest.yValue, nearest.yColumn);
      layer.innerHTML = `
        <line class="viewer-crosshair" x1="${nearest.x.toFixed(1)}" y1="${plotState.y1}" x2="${nearest.x.toFixed(1)}" y2="${plotState.y0}"></line>
        <line class="viewer-crosshair" x1="${plotState.x0}" y1="${nearest.y.toFixed(1)}" x2="${plotState.x1}" y2="${nearest.y.toFixed(1)}"></line>
        <rect class="viewer-tooltip-box" x="${tooltipX.toFixed(1)}" y="${tooltipY.toFixed(1)}" width="${tooltipWidth}" height="${tooltipHeight}"></rect>
        <circle cx="${nearest.x.toFixed(1)}" cy="${nearest.y.toFixed(1)}" r="5" fill="${nearest.color}" stroke="#fff" stroke-width="2"></circle>
        <text class="viewer-tooltip-text" x="${(tooltipX + 10).toFixed(1)}" y="${(tooltipY + 18).toFixed(1)}">${escapeHtml(shortColumnLabel(nearest.seriesLabel, 33))}</text>
        <text class="viewer-tooltip-text" x="${(tooltipX + 10).toFixed(1)}" y="${(tooltipY + 34).toFixed(1)}">X: ${escapeHtml(xText)}</text>
        <text class="viewer-tooltip-text" x="${(tooltipX + 10).toFixed(1)}" y="${(tooltipY + 50).toFixed(1)}">Y: ${escapeHtml(yText)}</text>
      `;
    }

    function hideViewerTooltip() {
      const layer = viewerChart.querySelector("#viewerHoverLayer");
      if (layer) layer.innerHTML = "";
    }

    function nearestViewerPoint(point, points) {
      let nearest = null;
      let nearestDistance = Infinity;
      points.forEach((candidate) => {
        const distance = Math.hypot(candidate.x - point.x, candidate.y - point.y);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearest = candidate;
        }
      });
      return nearest ? { ...nearest, distance: nearestDistance } : null;
    }

    function updateViewerZoomStatus(plotState) {
      if (!viewerZoomStatus) return;
      if (!plotState) {
        viewerZoomStatus.textContent = "Auto";
        return;
      }
      const xZoom = zoomRatio(plotState.autoDomain.minX, plotState.autoDomain.maxX, plotState.minX, plotState.maxX);
      const yZoom = zoomRatio(plotState.autoDomain.minY, plotState.autoDomain.maxY, plotState.minY, plotState.maxY);
      const manual = [viewerXMin, viewerXMax, viewerYMin, viewerYMax].some((input) => input.dataset.autoValue !== "1");
      viewerZoomStatus.textContent = manual ? `Zoom X ${formatZoomRatio(xZoom)} / Y ${formatZoomRatio(yZoom)}` : "Auto";
    }

    function zoomRatio(autoMin, autoMax, min, max) {
      const autoSpan = autoMax - autoMin;
      const span = max - min;
      return Number.isFinite(autoSpan) && Number.isFinite(span) && span > 0 ? autoSpan / span : 1;
    }

    function formatZoomRatio(value) {
      if (!Number.isFinite(value)) return "1x";
      if (value >= 100) return `${value.toFixed(0)}x`;
      if (value >= 10) return `${value.toFixed(1)}x`;
      return `${value.toFixed(2)}x`;
    }

    function exportViewerSvg() {
      if (!viewerChart.innerHTML.trim()) return;
      const source = new XMLSerializer().serializeToString(viewerChart);
      const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `s-band-viewer-${new Date().toISOString().replace(/[:.]/g, "-")}.svg`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function currentViewerRange(xColumn, yColumn) {
      const fields = [
        [viewerXMin, xColumn, "xMin"],
        [viewerXMax, xColumn, "xMax"],
        [viewerYMin, yColumn, "yMin"],
        [viewerYMax, yColumn, "yMax"]
      ];
      const range = { xMin: null, xMax: null, yMin: null, yMax: null, invalidInputs: [] };
      fields.forEach(([input, column, key]) => {
        input.classList.remove("invalid");
        const value = input.dataset.autoValue === "1" ? null : parseAxisBound(input.value, column);
        if (Number.isNaN(value)) {
          range.invalidInputs.push(input);
        } else {
          range[key] = value;
        }
      });
      return range;
    }

    function updateAutoRangeInputs(xColumn, yColumn, minX, maxX, minY, maxY) {
      setAutoRangeInput(viewerXMin, minX, xColumn);
      setAutoRangeInput(viewerXMax, maxX, xColumn);
      setAutoRangeInput(viewerYMin, minY, yColumn);
      setAutoRangeInput(viewerYMax, maxY, yColumn);
    }

    function setAutoRangeInput(input, value, column) {
      if (!input) return;
      if (document.activeElement === input) return;
      if (input.dataset.autoValue === "1" || input.value.trim() === "") {
        input.value = formatRangeInputValue(value, column);
        input.dataset.autoValue = "1";
      }
    }

    function formatRangeInputValue(value, column) {
      if (!Number.isFinite(value)) return "";
      if (isDateTimeColumn(column) && Math.abs(value) > 10000000000) {
        return formatDateTimeTick(value);
      }
      return formatRangeNumber(value);
    }

    function formatRangeNumber(value) {
      const absolute = Math.abs(value);
      if (absolute >= 100000 || (absolute > 0 && absolute < 0.000001)) {
        return value.toExponential(6);
      }
      return Number(value.toPrecision(12)).toString();
    }

    function parseAxisBound(value, column) {
      const trimmed = String(value || "").trim();
      if (!trimmed) return null;
      const numeric = Number(trimmed);
      if (Number.isFinite(numeric)) return numeric;
      if (isDateTimeColumn(column)) {
        const parsedTime = parseDateTimeValue(trimmed);
        if (Number.isFinite(parsedTime)) return parsedTime;
      }
      return Number.NaN;
    }

    function resolveAxisDomain(values, lower, upper, includeZero) {
      let [min, max] = viewerAxisDomain(values, includeZero);
      if (lower !== null) min = lower;
      if (upper !== null) max = upper;
      if (min > max) [min, max] = [max, min];
      if (min === max) {
        const pad = Math.max(Math.abs(min) * 0.05, 1);
        min -= pad;
        max += pad;
      }
      return [min, max];
    }

    function viewerAxisDomain(values, includeZero) {
      let min = Math.min(...values);
      let max = Math.max(...values);
      if (min === max) {
        const pad = Math.max(Math.abs(min) * 0.05, 1);
        return [min - pad, max + pad];
      }
      if (includeZero && min >= 0) {
        min = 0;
      } else if (includeZero && max <= 0) {
        max = 0;
      }
      const range = max - min;
      const pad = range * 0.05;
      return [min - pad, max + pad];
    }

    function axisTicks(min, max) {
      return [min, min + (max - min) / 2, max];
    }

    function formatAxisTick(value, column) {
      if (isDateTimeColumn(column) && Math.abs(value) > 10000000000) {
        const formatted = formatDateTimeTick(value);
        if (formatted) return formatted;
      }
      return formatNumberTick(value);
    }

    function parseDateTimeValue(value) {
      const trimmed = String(value || "").trim();
      const localTime = parseLocalNaiveDateTime(trimmed);
      if (Number.isFinite(localTime)) return localTime;
      const parsed = Date.parse(trimmed);
      return Number.isFinite(parsed) ? parsed : Number.NaN;
    }

    function parseLocalNaiveDateTime(value) {
      const match = String(value || "").trim().match(
        /^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})(?:[ T](\d{1,2})(?::(\d{1,2})(?::(\d{1,2}))?)?)?$/
      );
      if (!match) return Number.NaN;

      const [, yearText, monthText, dayText, hourText = "0", minuteText = "0", secondText = "0"] = match;
      const year = Number(yearText);
      const month = Number(monthText);
      const day = Number(dayText);
      const hour = Number(hourText);
      const minute = Number(minuteText);
      const second = Number(secondText);
      const date = new Date(year, month - 1, day, hour, minute, second);

      if (
        date.getFullYear() !== year ||
        date.getMonth() !== month - 1 ||
        date.getDate() !== day ||
        date.getHours() !== hour ||
        date.getMinutes() !== minute ||
        date.getSeconds() !== second
      ) {
        return Number.NaN;
      }
      return date.getTime();
    }

    function formatDateTimeTick(value) {
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return "";
      return [
        date.getFullYear(),
        padDatePart(date.getMonth() + 1),
        padDatePart(date.getDate())
      ].join("/") + ` ${padDatePart(date.getHours())}:${padDatePart(date.getMinutes())}:${padDatePart(date.getSeconds())}`;
    }

    function padDatePart(value) {
      return String(value).padStart(2, "0");
    }

    function formatNumberTick(value) {
      const absolute = Math.abs(value);
      if (absolute >= 100000 || (absolute > 0 && absolute < 0.001)) {
        return value.toExponential(2);
      }
      if (absolute >= 100) return value.toFixed(0);
      if (absolute >= 10) return value.toFixed(2);
      if (absolute === 0) return "0";
      return Number(value.toPrecision(4)).toString();
    }

    function columnMeta(column) {
      const raw = String(column || "").trim();
      const normalized = raw
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/[_/.\-()[\]{}]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      const name = normalized.toLowerCase();
      const tokenText = ` ${name} `;
      const label = normalized || raw || "value";
      const meta = (type, unit, category, scaleToBase = 1, sourceUnit = unit) => ({
        type,
        unit,
        sourceUnit,
        category,
        label,
        scaleToBase
      });

      if (raw === "row_index") return meta("index", "index", "row_index");
      if (!raw) return meta("number", "", "value");
      if (/(^| )(count|counter|num|number|length bytes|bytes|step)( |$)/.test(tokenText)) {
        return meta("integer", "count", "count");
      }
      if (/(^| )(enabled|valid|invalid|active|ready|locked|on|off|ok|fail|fault|flag|boolean|bool|heater|switch|relay|status)( |$)/.test(tokenText)
        || /on off/.test(name)) {
        return meta("flag", "0/1", "flag");
      }
      if (/(^| )(timestamp|datetime|date|received time|adcs time)( |$)/.test(tokenText)) return meta("datetime", "Time", "time");
      if (/(^| )(usec|microseconds)( |$)/.test(tokenText)) return meta("time", "us", "time");
      if (/(^| )(msec|milliseconds)( |$)/.test(tokenText)) return meta("time", "ms", "time");
      if (/(^| )hours( |$)/.test(tokenText)) return meta("time", "h", "time");
      if (/(^| )(time|timer|tai seconds|jd of now wrt tai|utc to tai|seconds)( |$)/.test(tokenText)) {
        return meta("time", "s", "time");
      }
      if (/(^| )(uv|u v|microvolt|microvolts)( |$)/.test(tokenText)) return meta("number", "V", "voltage", 0.000001, "uV");
      if (/(^| )(mv|m v|millivolt|millivolts)( |$)/.test(tokenText)) return meta("number", "V", "voltage", 0.001, "mV");
      if (/(^| )(kv|k v|kilovolt|kilovolts)( |$)/.test(tokenText)) return meta("number", "V", "voltage", 1000, "kV");
      if (/(^| )(voltage|volt|volts|v)( |$)/.test(tokenText)) return meta("number", "V", "voltage");
      if (/(^| )(ua|u a|microamp|microamps|microampere|microamperes)( |$)/.test(tokenText)) return meta("number", "A", "current", 0.000001, "uA");
      if (/(^| )(ma|m a|milliamp|milliamps|milliampere|milliamperes)( |$)/.test(tokenText)) return meta("number", "A", "current", 0.001, "mA");
      if (/(^| )(ka|k a|kiloamp|kiloamps|kiloampere|kiloamperes)( |$)/.test(tokenText)) return meta("number", "A", "current", 1000, "kA");
      if (/(^| )(current|amp|amps|ampere|amperes|a)( |$)/.test(tokenText)) return meta("number", "A", "current");
      if (/(^| )(temp|temperature|thermal)( |$)/.test(tokenText)) return meta("number", "degC", "temperature");
      if (/(^| )rssi( |$)/.test(tokenText)) return meta("number", "dBm", "rssi");
      if (/(^| )(frequency|freq|hz)( |$)/.test(tokenText)) return meta("number", "Hz", "frequency");
      if (/(^| )rpm( |$)/.test(tokenText)) return meta("number", "rpm", "rpm");
      if (/(^| )(body rate|att rate|rate est|raw first packet rates|gyro)( |$)/.test(tokenText)
        || (/(^| )rate(s)?( |$)/.test(tokenText) && !/(^| )(bitrate|timer|update cycle)( |$)/.test(tokenText))) {
        return meta("number", "deg/s", "rate");
      }
      if (/(^| )(angle|roll|pitch|yaw|latitude|longitude|declination|right asc)( |$)/.test(tokenText)) {
        return meta("number", "deg", "angle");
      }
      if (/(^| )(mode|status|state|config|configuration|setting|source|reason|algorithm|alg|target|cmd|command|id)( |$)/.test(tokenText)) {
        return meta("enum", "", "enum/text");
      }
      return meta("number", "", "value");
    }

    function axisLabel(column) {
      const meta = columnMeta(column);
      return meta.unit ? `${meta.label} [${meta.unit}]` : meta.label;
    }

    function yAxisTitleForColumns(columns) {
      if (normalizeEnabled()) return normalizeAxisLabel();
      const units = [...new Set(columns.map((column) => unitLabel(column)).filter(Boolean))];
      return units.length ? units.join(", ") : "value";
    }

    function unitLabel(column) {
      return columnMeta(column).unit;
    }

    function unitScaleForColumn(column) {
      const scale = columnMeta(column).scaleToBase;
      return Number.isFinite(scale) ? scale : 1;
    }

    function isTimeColumn(column) {
      return columnMeta(column).category === "time";
    }

    function isDateTimeColumn(column) {
      return columnMeta(column).type === "datetime";
    }

    function shouldIncludeZeroForYAxis(columns) {
      const usableColumns = columns.filter(Boolean);
      if (!usableColumns.length) return false;
      return usableColumns.every((column) => {
        const meta = columnMeta(column);
        return meta.category === "flag" || meta.category === "count" || meta.category === "row_index";
      });
    }

    function updateViewerAxisDisplay() {
      updateViewerUnitLabel(viewerXUnit, viewerXAxis.value);
      updateViewerUnitLabel(viewerYUnit, viewerYAxis.value);
      updateViewerY2AxisVisibility();
      updateViewerRangeInputHints();
    }

    function updateViewerY2AxisVisibility() {
      if (!viewerY2AxisControl) return;
      viewerY2AxisControl.hidden = false;
    }

    function updateViewerUnitLabel(target, column) {
      const unit = unitLabel(column);
      target.textContent = unit;
      target.hidden = !unit;
    }

    function updateViewerRangeInputHints() {
      [
        [viewerXMin, viewerXAxis.value],
        [viewerXMax, viewerXAxis.value],
        [viewerYMin, viewerYAxis.value],
        [viewerYMax, viewerYAxis.value]
      ].forEach(([input, column]) => {
        if (isDateTimeColumn(column)) {
          input.placeholder = "YYYY/MM/DD hh:mm:ss";
          input.title = "YYYY/MM/DD hh:mm:ss";
        } else {
          input.placeholder = "Auto";
          input.title = "Auto";
        }
      });
    }

    function numericOrTime(value, index) {
      if (value === "row_index") return index;
      if (value === null || value === undefined || String(value).trim() === "") return Number.NaN;
      const numeric = Number(value);
      if (Number.isFinite(numeric)) return numeric;
      const time = parseDateTimeValue(value);
      return Number.isFinite(time) ? time : Number.NaN;
    }

    function viewerValueForColumn(row, column) {
      if (column === "row_index") return "row_index";
      if (Object.prototype.hasOwnProperty.call(row, column) && row[column] !== "") {
        return row[column];
      }
      return "";
    }

    function viewerYValueForColumn(row, column, index) {
      const value = numericOrTime(viewerValueForColumn(row, column), index);
      if (!Number.isFinite(value)) return value;
      return value * unitScaleForColumn(column);
    }

    function changePage(direction) {
      const maxOffset = lastPageOffset();
      let nextOffset = state.offset;
      if (direction === "first") nextOffset = 0;
      if (direction === "back") nextOffset = Math.max(0, state.offset - PAGE_SIZE);
      if (direction === "next") nextOffset = Math.min(maxOffset, state.offset + PAGE_SIZE);
      if (direction === "end") nextOffset = maxOffset;
      if (nextOffset === state.offset) return;
      state.offset = nextOffset;
      searchRows();
    }

    function jumpToPage(value) {
      const pages = totalPages();
      if (!pages) return;
      const requestedPage = Number.parseInt(value, 10);
      const page = Math.min(Math.max(requestedPage || 1, 1), pages);
      state.offset = (page - 1) * PAGE_SIZE;
      searchRows();
    }

    function updatePager(rowCount) {
      const page = currentPage();
      const pages = totalPages();
      const hasRows = state.total > 0;
      const atFirst = state.offset === 0;
      const atEnd = !hasRows || state.offset >= lastPageOffset();

      pageLabel.textContent = `/ ${pages}`;
      pageInput.disabled = !hasRows;
      pageInput.max = String(pages || 1);
      pageInput.value = String(page || 1);
      pageInput.title = rowCount ? `${state.offset + 1}-${state.offset + rowCount} of ${state.total}` : "No rows";

      document.querySelector("[data-page='first']").disabled = !hasRows || atFirst;
      document.querySelector("[data-page='back']").disabled = !hasRows || atFirst;
      document.querySelector("[data-page='next']").disabled = atEnd;
      document.querySelector("[data-page='end']").disabled = atEnd;
    }

    function currentPage() {
      return Math.floor(state.offset / PAGE_SIZE) + 1;
    }

    function totalPages() {
      return Math.ceil(state.total / PAGE_SIZE);
    }

    function lastPageOffset() {
      const pages = totalPages();
      return pages ? (pages - 1) * PAGE_SIZE : 0;
    }

    function displayLimit() {
      const value = Number.parseInt(limitInput.value, 10);
      return Number.isFinite(value) && value > 0 ? value : 1000;
    }

    function maxOffsetForLimit(limit) {
      return limit > 0 ? Math.floor((limit - 1) / PAGE_SIZE) * PAGE_SIZE : 0;
    }

    function cleanApiBase() {
      return apiBase.value.replace(/\/+$/, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    Promise.all([loadPicSetLabels(), loadValueColumns()]).finally(() => {
      const viewerPageState = IS_VIEWER_PAGE ? readViewerPageState() : null;
      if (viewerPageState) {
        applyViewerPageState(viewerPageState);
      } else {
        state.valueFilters = [defaultValueFilter()];
      }
      render();
      if (viewerPageState) applyViewerControls(viewerPageState.viewer || {});
      checkServer();
      const decoderPromise = loadDecoders();
      if (IS_VIEWER_PAGE) {
        decoderPromise.finally(() => {
          renderUrl();
          refreshViewerRows();
        });
      }
    });
  </script>
</body>
</html>
